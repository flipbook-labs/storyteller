name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      statuses: write
    steps:
      - uses: actions/checkout@v6
        with:
          # `require-entry` diffs against the PR base branch, so a merge-base must
          # exist. Full history guarantees it (the default depth-1 checkout does not).
          fetch-depth: 0

      - uses: flipbook-labs/changewrite@v0.7.0
        with:
          require-entry: 'true'

      # Clear the publish-lock status on this PR's head so a required check can pass.
      # The publish PR gets its lock managed by the release workflow instead.
      - uses: flipbook-labs/changewrite/publish-lock@v0.7.0
        if: github.head_ref != 'publish-next-version'
        with:
          locked: false
          sha: ${{ github.event.pull_request.head.sha }}
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: CompeyDev/setup-rokit@v0.2.1
        with:
          version: v1.2.0

      - name: Install packages
        run: lute run install

      - name: Lint
        run: lute run lint

      - name: Get model file name
        run: |
          name=$(jq -r .name default.project.json)
          sha=${GITHUB_SHA:0:7}
          echo "MODEL_FILE=$name-$sha.rbxm" >> $GITHUB_ENV

      - name: Build
        run: lute run build --channel prod --output ${{ env.MODEL_FILE }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.MODEL_FILE }}
          path: ${{ env.MODEL_FILE }}

  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: CompeyDev/setup-rokit@v0.2.1
        with:
          version: v1.2.0

      - name: Setup Lute typedefs
        run: lute setup

      - name: Install packages
        run: lute run install

      - name: Create prod build to be analyzed
        run: lute run build --channel prod

      - name: Run Luau analysis
        run: lute run analyze --include-build

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: CompeyDev/setup-rokit@v0.2.1
        with:
          version: v1.2.0

      - name: Install packages
        run: lute run install

      - name: Run tests
        run: lute run test
        env:
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}

  benchmarks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Non-blocking: benchmark numbers inform reviews but timing variance on
    # shared runners should not gate merges.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: CompeyDev/setup-rokit@v0.2.1
        with:
          version: v1.2.0

      - name: Install packages
        run: lute run install

      - name: Run benchmarks
        run: lute run test --benchmarks
        env:
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
